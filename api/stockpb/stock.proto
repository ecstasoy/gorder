syntax = "proto3";
package stockpb;

option go_package = "github.com/ecstasoy/gorder/common/genproto/stockpb";

import "orderpb/order.proto";

service StockService {
  rpc GetItems(GetItemsRequest) returns (GetItemsResponse);
  rpc CheckIfItemsInStock(CheckIfItemsInStockRequest) returns (CheckIfItemsInStockResponse);
  rpc RestoreStock(RestoreStockRequest) returns (RestoreStockResponse);
  rpc WarmUpFlashStock(WarmUpFlashStockRequest) returns (WarmUpFlashStockResponse);
  rpc DeductStock(DeductStockRequest) returns (DeductStockResponse);
}

message RestoreStockRequest {
  repeated orderpb.ItemWithQuantity Items = 1;
}

message RestoreStockResponse {}

message GetItemsRequest {
  repeated string ItemIDs = 1;
}

message GetItemsResponse {
  repeated orderpb.Item Items = 1;
}

message CheckIfItemsInStockRequest {
  repeated orderpb.ItemWithQuantity Items = 1;
}

message CheckIfItemsInStockResponse {
  bool InStock = 1;
  repeated orderpb.Item Items = 2;
}

message WarmUpFlashStockRequest {
  repeated orderpb.ItemWithQuantity Items = 1;
  int64 TTLSeconds = 2;
}

message WarmUpFlashStockResponse {}

message DeductStockRequest {
  repeated orderpb.ItemWithQuantity Items = 1;
}
message DeductStockResponse {}