syntax = "proto3";
package orderpb;

option go_package = "github.com/ecstasoy/gorder/common/genproto/orderpb";

import "google/protobuf/empty.proto";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (google.protobuf.Empty);
  rpc GetOrder(GetOrderRequest) returns (Order);
  rpc UpdateOrder(Order) returns (google.protobuf.Empty);
}

// OrderStatus 定义订单状态枚举
enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;  // 未指定
  ORDER_STATUS_PENDING = 1;       // 待处理
  ORDER_STATUS_PAID = 2;          // 已支付
  ORDER_STATUS_PREPARING = 3;     // 准备中
  ORDER_STATUS_READY = 4;         // 准备完成
  ORDER_STATUS_DELIVERING = 5;    // 配送中
  ORDER_STATUS_DELIVERED = 6;     // 已送达
  ORDER_STATUS_CANCELLED = 7;     // 已取消
}

message CreateOrderRequest {
  string CustomerID = 1;
  repeated ItemWithQuantity Items = 2;
}

message GetOrderRequest {
  string OrderID = 1;
  string CustomerID = 2;
}

message ItemWithQuantity {
  string ItemID = 1;
  int32 Quantity = 2;
}

message Item {
  string ID = 1;
  string Name = 2;
  int32 Quantity = 3;
  string PriceID = 4;
}

message Order {
  string ID = 1;
  string CustomerID = 2;
  OrderStatus Status = 3;
  repeated Item Items = 4;
  string PaymentLink = 5;
}